  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px 8px 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: border-color 0.15s, background 0.15s; user-select: none; }
  .card:hover { border-color: #555; background: #222; }
  .card:active { transform: scale(0.96); }
  .img-wrap { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
  .card img { width: 36px; height: 36px; object-fit: contain; filter: invert(1) brightness(0.85); }
  .card img.err { opacity: 0.15; filter: none; }
  .card-name { font-size: 10px; color: #888; text-align: center; word-break: break-all; line-height: 1.4; }
  .card:hover .card-name { color: #bbb; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #fff; color: #111; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 500; display: none; z-index: 999; pointer-events: none; }
  .more-btn { grid-column: 1 / -1; text-align: center; padding: 16px; color: #666; font-size: 13px; cursor: pointer; border: 1px dashed #2a2a2a; border-radius: 10px; }
  .more-btn:hover { color: #aaa; border-color: #444; }
  .spinner { width: 18px; height: 18px; border: 2px solid #2a2a2a; border-top-color: #666; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

const allNames = Object.keys(symbols).sort();
const grid = document.getElementById('grid');
const countEl = document.getElementById('count');
const toast = document.getElementById('toast');
const proxySelect = document.getElementById('proxySelect');
let page = 0;
const PER_PAGE = 120;
let current = allNames;

function getImgUrl(id) {
  const base = `https://www.roblox.com/asset/?id=${id}`;
  const p = proxySelect.value;
  if (p === 'corsproxy') return `https://corsproxy.io/?${encodeURIComponent(base)}`;
  if (p === 'allorigins') return `https://api.allorigins.win/raw?url=${encodeURIComponent(base)}`;
  return base;
}

function showToast(msg) {
  toast.textContent = msg;
  toast.style.display = 'block';
  clearTimeout(window._t);
  window._t = setTimeout(() => toast.style.display = 'none', 1600);
}

function copyName(name) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(name).then(() => showToast('✓ ' + name)).catch(() => fallback(name));
  } else fallback(name);
}
function fallback(name) {
  const ta = document.createElement('textarea');
  ta.value = name; document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
  showToast('✓ ' + name);
}

function makeCard(name) {
  const id = symbols[name];
  const div = document.createElement('div');
  div.className = 'card';
  div.title = name;

  const wrap = document.createElement('div');
  wrap.className = 'img-wrap';

  const spin = document.createElement('div');
  spin.className = 'spinner';
  wrap.appendChild(spin);

  const img = document.createElement('img');
  img.style.display = 'none';
  img.src = getImgUrl(id);
  img.alt = name;
  img.loading = 'lazy';
  img.onload = () => { spin.remove(); img.style.display = ''; };
  img.onerror = () => { spin.remove(); img.style.display = ''; img.classList.add('err'); };
  wrap.appendChild(img);

  const label = document.createElement('div');
  label.className = 'card-name';
  label.textContent = name;

  div.appendChild(wrap);
  div.appendChild(label);
  div.onclick = () => copyName(name);
  return div;
}

function renderCards(names, append) {
  const existing = grid.querySelector('.more-btn');
  if (existing) existing.remove();
  if (!append) grid.innerHTML = '';
  const frag = document.createDocumentFragment();
  names.forEach(n => frag.appendChild(makeCard(n)));
  grid.appendChild(frag);
  const shown = (page + 1) * PER_PAGE;
  if (shown < current.length) {
    const btn = document.createElement('div');
    btn.className = 'more-btn';
    btn.textContent = `▼ โหลดเพิ่ม ${Math.min(PER_PAGE, current.length - shown)} รายการ (เหลือ ${current.length - shown})`;
    btn.onclick = () => { page++; renderCards(current.slice(page * PER_PAGE, (page+1) * PER_PAGE), true); };
    grid.appendChild(btn);
  }
}

function render(names) {
  current = names; page = 0;
  countEl.textContent = `${names.length} symbols`;
  renderCards(names.slice(0, PER_PAGE), false);
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  render(q ? allNames.filter(n => n.toLowerCase().includes(q)) : allNames);
});

proxySelect.addEventListener('change', () => render(current));
render(allNames);
</script>
